<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetMark — سوق الحيوانات الأليفة ومستلزماتها</title>
<meta name="description" content="PetMark — متجرك الإلكتروني للحيوانات الأليفة ومستلزماتها. سجل متجرك مجاناً وابدأ البيع.">
<meta name="robots" content="index, follow">
<meta name="keywords" content="حيوانات أليفة, كلاب, قطط, طعام حيوانات, مستلزمات حيوانات, pet supplies">
<meta property="og:title" content="PetMark — سوق الحيوانات الأليفة">
<meta property="og:description" content="منصة بيع وشراء الحيوانات الأليفة ومستلزماتها">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#0d9488;--pd:#0a756d;--pl:#14b8a6;--ac:#f59e0b;--al:#fbbf24;--bg:#f0fdfa;--card:#fff;--txt:#333;--txtl:#777;--txtm:#aaa;--brd:#d1fae5;--sh:0 2px 15px rgba(0,0,0,.08);--shl:0 8px 30px rgba(0,0,0,.12);--r:14px;--rs:10px;--t:all .3s ease;--ok:#28a745;--warn:#ffc107;--err:#dc3545}
body.dark{--bg:#0f172a;--card:#1e293b;--txt:#e2e8f0;--txtl:#94a3b8;--txtm:#64748b;--brd:#334155;--sh:0 2px 15px rgba(0,0,0,.3);--shl:0 8px 30px rgba(0,0,0,.5)}
body.dark .hdr{background:linear-gradient(135deg,#0f172a,#1e293b)}
body.dark .tbl th{background:#1e293b}
body.dark .hero{background:linear-gradient(135deg,#0f172a,#134e4a)}
body.dark .auth-box h2,body.dark .plan-name{color:var(--pl)}
body.dark .fg input,body.dark .fg textarea,body.dark .fg select{background:var(--bg);color:var(--txt)}
body.dark .up-area{border-color:var(--brd)}
body.dark .pw-eye{filter:invert(1)}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--txt);line-height:1.7;min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:var(--ac);border-radius:4px}
a{color:inherit;text-decoration:none}
.dark-toggle{position:fixed;top:14px;left:14px;z-index:9998;width:42px;height:42px;border-radius:50%;background:var(--card);border:2px solid var(--brd);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:var(--sh);transition:var(--t)}
.dark-toggle:hover{border-color:var(--p);transform:scale(1.05)}
.hdr{background:linear-gradient(135deg,var(--pd),var(--p),var(--pl));color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.hdr-in{max-width:1300px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-ic{width:44px;height:44px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo h1{font-size:20px;font-weight:800}.logo span{font-size:11px;opacity:.8}
.hdr-acts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:9px 18px;border-radius:var(--rs);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:var(--t);border:none;display:inline-flex;align-items:center;gap:6px}
.btn-n{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-n:hover{background:rgba(255,255,255,.25)}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-a{background:var(--ac);color:#fff}.btn-a:hover{background:var(--al)}
.btn-d{background:#d44;color:#fff}.btn-d:hover{background:#b22}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{background:#218838}
.btn-s{background:var(--bg);color:var(--txt);border:1px solid var(--brd)}.btn-s:hover{background:var(--brd)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-lg{padding:14px 32px;font-size:16px}

/* HERO */
.hero{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;padding:60px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(218,165,32,.15),transparent 70%);border-radius:50%}
.hero-c{position:relative;z-index:1;max-width:700px;margin:0 auto}
.hero h2{font-size:38px;font-weight:900;margin-bottom:14px}.hero p{font-size:16px;opacity:.9;font-weight:300;margin-bottom:24px}
.badge{display:inline-block;background:rgba(218,165,32,.2);color:var(--al);padding:6px 18px;border-radius:20px;font-size:13px;margin-bottom:16px;border:1px solid rgba(218,165,32,.3)}

/* STATS */
.stats{max-width:1300px;margin:-40px auto 30px;padding:0 24px;position:relative;z-index:2}
.stats-in{background:var(--card);border-radius:var(--r);box-shadow:var(--shl);padding:24px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;text-align:center}
.stat h4{font-size:28px;font-weight:800;color:var(--p)}.stat p{font-size:12px;color:var(--txtl)}

/* MAIN */
.main{max-width:1300px;margin:0 auto;padding:20px 24px 50px}
.sec-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.sec-t{font-size:24px;font-weight:700;color:var(--pd)}.sec-s{color:var(--txtl);font-size:14px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--brd);transition:var(--t);position:relative}
.card:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.card-body{padding:18px}.card-title{font-size:17px;font-weight:700;margin-bottom:6px}.card-desc{font-size:13px;color:var(--txtl);margin-bottom:10px}

/* PRICING */
.pricing{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;margin:20px 0}
.plan{background:var(--card);border-radius:var(--r);padding:28px;box-shadow:var(--sh);border:2px solid var(--brd);transition:var(--t);text-align:center;position:relative}
.plan:hover{transform:translateY(-4px);box-shadow:var(--shl)}
.plan.pop{border-color:var(--ac)}.plan.pop::before{content:'⭐ الأكثر شعبية';position:absolute;top:-12px;right:50%;transform:translateX(50%);background:var(--ac);color:#fff;padding:3px 16px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.plan-icon{font-size:40px;margin-bottom:12px}.plan-name{font-size:20px;font-weight:800;color:var(--pd);margin-bottom:4px}
.plan-price{font-size:32px;font-weight:900;color:var(--p);margin:12px 0}.plan-price small{font-size:14px;color:var(--txtl);font-weight:400}
.plan-old{text-decoration:line-through;color:var(--txtm);font-size:14px}.plan-new{color:var(--ok);font-size:12px;font-weight:700;margin:4px 0}
.plan-feat{text-align:right;margin:16px 0;font-size:13px;color:var(--txtl)}
.plan-feat li{margin-bottom:6px;list-style:none;padding-right:20px;position:relative}
.plan-feat li::before{content:'✓';position:absolute;right:0;color:var(--ok);font-weight:700}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tbl th{background:var(--pd);color:#fff;padding:12px 16px;font-size:13px;font-weight:600;text-align:right}
.tbl td{padding:10px 16px;border-bottom:1px solid var(--brd);font-size:13px}
.tbl tr:hover td{background:rgba(139,69,19,.03)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r)}

/* BADGES */
.bdg{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-block}
.bdg-ok{background:#d4edda;color:#155724}.bdg-warn{background:#fff3cd;color:#856404}.bdg-err{background:#f8d7da;color:#721c24}.bdg-info{background:#cce5ff;color:#004085}
.bdg-free{background:#e2e3e5;color:#383d44}.bdg-plus{background:#d4edda;color:#155724}.bdg-pro{background:#cce5ff;color:#004085}.bdg-unl{background:#f8d7da;color:#721c24}

/* MODAL */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.mo.on{display:flex}
.md{background:var(--card);border-radius:var(--r);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shl);animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.md-h{padding:20px 24px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center}
.md-h h3{font-size:18px;font-weight:700}
.md-x{width:32px;height:32px;border:none;background:var(--bg);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--t)}.md-x:hover{background:#fee;color:#c33}
.md-b{padding:24px}.md-f{padding:16px 24px;border-top:1px solid var(--brd);display:flex;gap:10px;justify-content:flex-end}

/* FORM */
.fg{margin-bottom:18px}.fg label{display:block;font-weight:600;margin-bottom:6px;font-size:13px}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;border:2px solid var(--brd);border-radius:var(--rs);font-family:inherit;font-size:14px;transition:var(--t);background:var(--bg);color:var(--txt);direction:rtl}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(139,69,19,.1)}
.fg textarea{min-height:80px;resize:vertical}
.up-area{border:2px dashed var(--brd);border-radius:var(--rs);padding:24px;text-align:center;cursor:pointer;transition:var(--t)}.up-area:hover{border-color:var(--p)}.up-area p{color:var(--txtl);font-size:13px}
.pw-wrap{position:relative}.pw-wrap input{padding-left:40px!important}.pw-eye{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;opacity:.5;transition:var(--t)}.pw-eye:hover{opacity:1}
.store-slug-preview{font-size:12px;color:var(--txtl);margin-top:4px;direction:ltr;text-align:right}.store-slug-preview code{background:var(--bg);padding:2px 8px;border-radius:4px;color:var(--p)}

/* AUTH BOX */
.auth-box{max-width:450px;margin:60px auto;background:var(--card);border-radius:var(--r);padding:40px;box-shadow:var(--shl);text-align:center}
.auth-box h2{font-size:24px;color:var(--pd);margin-bottom:20px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--pd);color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:13px;z-index:3000;transition:transform .4s ease;box-shadow:var(--shl)}.toast.on{transform:translateX(-50%) translateY(0)}

/* FOOTER */
.ftr{background:var(--pd);color:rgba(255,255,255,.7);text-align:center;padding:24px;font-size:13px}
.ftr-links{display:flex;justify-content:center;gap:20px;margin-top:12px;flex-wrap:wrap}
.ftr-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:12px;transition:var(--t);padding:4px 10px;border-radius:6px}
.ftr-links a:hover{color:#fff;background:rgba(255,255,255,.1)}

/* VENDOR STORE PREVIEW */
.store-header{background:linear-gradient(135deg,var(--pd),var(--p));color:#fff;padding:30px;border-radius:var(--r);margin-bottom:20px;display:flex;align-items:center;gap:20px}
.store-avatar{width:70px;height:70px;background:rgba(255,255,255,.2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px}
.store-info h2{font-size:24px;font-weight:800}.store-info p{opacity:.8;font-size:14px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg);border-radius:var(--rs);padding:4px;overflow-x:auto}
.tab{padding:10px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:var(--t);white-space:nowrap;border:none;background:none;color:var(--txtl);font-family:inherit}
.tab.on{background:var(--card);color:var(--p);box-shadow:var(--sh)}
.tab:hover:not(.on){color:var(--txt)}

/* DASHBOARD CARDS */
.dash-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.dash-card{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--brd);text-align:center}
.dash-card .num{font-size:32px;font-weight:900;color:var(--p)}.dash-card .lbl{font-size:12px;color:var(--txtl);margin-top:4px}

/* EMPTY */
.empty{text-align:center;padding:50px 16px;color:var(--txtm)}.empty-ic{font-size:48px;margin-bottom:12px;opacity:.5}.empty h4{font-size:16px;color:var(--txtl);margin-bottom:6px}

/* IMG GRID */
.imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.img-it{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1}
.img-it img{width:100%;height:100%;object-fit:cover}
.img-rm{position:absolute;top:3px;left:3px;width:22px;height:22px;background:rgba(200,30,30,.9);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}

/* LIGHTBOX */
.lb{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:2000;align-items:center;justify-content:center;cursor:pointer}.lb.on{display:flex}.lb img{max-width:90vw;max-height:90vh;object-fit:contain}

/* PRODUCT GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.prod-card{background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);border:1px solid var(--brd);transition:var(--t)}
.prod-card:hover{transform:translateY(-3px);box-shadow:var(--shl)}
.prod-img{width:100%;height:180px;object-fit:cover;background:#f0e6d8;cursor:pointer}
.prod-body{padding:14px}.prod-title{font-size:15px;font-weight:700;margin-bottom:4px}.prod-desc{font-size:12px;color:var(--txtl);margin-bottom:8px}
.price-tag{position:absolute;top:10px;left:10px;background:var(--ac);color:#fff;padding:3px 10px;border-radius:16px;font-size:12px;font-weight:700;z-index:2}
.stock-badge{font-size:10px;padding:2px 8px;border-radius:10px}
.stock-ok{background:#d4edda;color:#155724}.stock-low{background:#fff3cd;color:#856404}.stock-out{background:#f8d7da;color:#721c24}

/* SOCIAL */
.social-bar{position:fixed;bottom:80px;left:20px;z-index:50;display:flex;flex-direction:column;gap:10px}
.social-btn{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 15px rgba(0,0,0,.2);transition:var(--t);text-decoration:none;border:none;cursor:pointer}
.social-btn:hover{transform:scale(1.1)}
.social-wa{background:#25D366}.social-fb{background:#1877F2;font-weight:900;font-family:sans-serif}

/* PAY BOX */
.pay-box{background:var(--bg);border-radius:var(--rs);padding:16px;border:1px solid var(--brd);margin:10px 0}
.pay-box h4{color:var(--p);margin-bottom:8px;font-size:14px}
.pay-num{font-size:20px;font-weight:700;color:var(--pd);letter-spacing:2px;direction:ltr;text-align:center;padding:10px;background:#fff;border-radius:8px;margin:8px 0}

/* VIEW */
.view{display:none}.view.on{display:block}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--p);font-weight:500;cursor:pointer;margin-bottom:20px;padding:8px 14px;border-radius:var(--rs);transition:var(--t);background:none;border:none;font-family:inherit;font-size:14px}.back:hover{background:rgba(139,69,19,.08)}

/* RESPONSIVE */
@media(max-width:768px){
.hdr-in{padding:10px 16px}.logo h1{font-size:17px}
.hero{padding:36px 16px 50px}.hero h2{font-size:26px}
.stats-in{grid-template-columns:repeat(2,1fr);padding:16px}
.main{padding:16px 12px 40px}
.pricing{grid-template-columns:1fr}
.grid,.prod-grid{grid-template-columns:1fr}
.dash-cards{grid-template-columns:repeat(2,1fr)}
.store-header{flex-direction:column;text-align:center}
.plan{padding:20px}
}
</style>
</head>
<body>

<button class="dark-toggle" onclick="toggleDark()" title="تبديل الوضع"><span id="darkIcon">🌙</span></button>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="lb" id="lb" onclick="closeLb()"><img id="lbImg"></div>
<div class="social-bar" id="socialBar"></div>

<script>
/* ===================================================================
   PetMark — سوق الحيوانات الأليفة — منصة بيع وشراء الحيوانات الأليفة ومستلزماتها المتعددة
   =================================================================== */

/* ===== CONFIG ===== */
var SUPER_ADMIN_EMAIL = 'admin@attara.com';
var SUPER_ADMIN_PASS  = '123456';
var PAYMENT_NUMBERS = [
  {type:'instapay', number:'01012345678', name:'PetMark — سوق الحيوانات الأليفة'},
  {type:'vodafone', number:'01098765432', name:'PetMark — سوق الحيوانات الأليفة'}
];
var SOCIAL_LINKS = {whatsapp:'https://wa.me/201012345678', facebook:'https://facebook.com/attara'};

/* ===== PLANS ===== */
var PLANS = {
  free:  {name:'مجاني',  icon:'🆓', products:15, price:0,    promo:0,    color:'#6c757d', cls:'free',  chapters:1},
  plus:  {name:'بلس',    icon:'⭐', products:50, price:500,  promo:300,  color:'#28a745', cls:'plus',  chapters:1},
  pro:   {name:'برو',    icon:'💎', products:1120,price:800,  promo:575,  color:'#007bff', cls:'pro',   chapters:3},
  unl:   {name:'غير محدود',icon:'🚀',products:99999,price:1500,promo:1200,color:'#dc3545', cls:'unl',   chapters:999}
};

/* ===== DB ===== */
function loadDb(){
  try{return JSON.parse(localStorage.getItem('attara_platform'))||null}catch(e){return null}
}
function saveDb(){localStorage.setItem('attara_platform',JSON.stringify(DB))}

var DB = loadDb();
if(!DB){
  DB = {
    vendors: [],
    products: [],
    orders: [],
    subscriptions: [],
    auctions: [],
    currentRound: 1,
    adSlots: 5,
    socialLinks: Object.assign({},SOCIAL_LINKS),
    paymentNumbers: PAYMENT_NUMBERS.slice(),
    adminPass: SUPER_ADMIN_PASS,
    customers: [],
    customerOrders: []
  };
  saveDb();
}

/* ===== STATE ===== */
var V = null; // current vendor
var SA = null; // super admin logged in
var C = null; // current customer
var cv = 'home'; // current view
var vendorTab = 'products';
var adminTab = 'vendors';
var customerTab = 'orders';

/* ===== IMG GEN ===== */
function genImg(name,c){
  var s='<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:'+c+';stop-opacity:.85"/><stop offset="100%" style="stop-color:'+c+';stop-opacity:.35"/></linearGradient></defs><rect width="400" height="300" fill="url(#g)"/><text x="200" y="120" text-anchor="middle" font-size="56" fill="white" opacity=".7">🌿</text><text x="200" y="185" text-anchor="middle" font-family="Tajawal,sans-serif" font-size="20" font-weight="700" fill="white">'+name+'</text><text x="200" y="215" text-anchor="middle" font-family="Tajawal,sans-serif" font-size="14" fill="white" opacity=".7">PetMark — سوق الحيوانات الأليفة</text></svg>';
  return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(s)));
}

/* ===== RENDER ===== */
function render(){
  var a=document.getElementById('app');
  var h='';
  h+=rHdr();
  if(cv==='home')        {h+=rHero();h+=rStats();h+=rPricing();h+=rFeatured()}
  else if(cv==='auth')   {if(authMode==='custLogin'||authMode==='custReg'){h+=rCustomerAuth()}else{h+=rAuth()}}
  else if(cv==='vendor') {h+=rVendorDash()}
  else if(cv==='store')  {h+=rPublicStore()}
  else if(cv==='admin')  {h+=rSuperAdmin()}
  else if(cv==='privacy'){h+=rPrivacy()}
  else if(cv==='terms')  {h+=rTerms()}
  else if(cv==='refund') {h+=rRefund()}
  else if(cv==='about')  {h+=rAbout()}
  else if(cv==='contact'){h+=rContact()}
  else if(cv==='customer'){h+=rCustomerDash()}
  h+=rFtr();
  a.innerHTML=h;
  rSocial();
}

/* ===== HEADER ===== */
function rHdr(){
  var h='<header class="hdr"><div class="hdr-in">';

/* ===== VENDOR LOGIN/REGISTER ===== */
function vendorLogin(){
  var e=document.getElementById('vE').value.trim(),p=document.getElementById('vP').value;
  var v=DB.vendors.find(function(x){return x.email===e&&x.pass===p});
  if(!v)return toast('❌ بيانات الدخول غير صحيحة');
  if(!v.active)return toast('⏳ حسابك قيد المراجعة — انتظر تفعيله');
  V=v;toast('✅ مرحباً '+v.name);go('vendor');
}
function vendorRegister(){
  var n=document.getElementById('rN').value.trim(),e=document.getElementById('rE').value.trim(),
      ph=document.getElementById('rPh').value.trim(),pa=document.getElementById('rPa').value,
      d=document.getElementById('rD').value.trim(),ic=document.getElementById('rI').value.trim()||'🏪',
      plan=document.getElementById('rPlan').value,
      slug=document.getElementById('rSlug').value.trim().toLowerCase().replace(/[^a-z0-9-]/g,'').replace(/--+/g,'-');
  if(!n||!e||!ph||!pa)return toast('⚠️ أكمل جميع الحقول');
  if(!slug)return toast('⚠️ أدخل اسم المتجر في الرابط');
  if(DB.vendors.find(function(x){return x.email===e}))return toast('⚠️ البريد مسجل مسبقاً');
  if(DB.vendors.find(function(x){return x.slug===slug}))return toast('⚠️ اسم الرابط مستخدم من بائع آخر');
  var v={id:'v_'+Date.now(),name:n,email:e,phone:ph,pass:pa,desc:d,icon:ic,slug:slug,
    plan:plan,active:false,createdAt:new Date().toLocaleString('ar-EG'),ts:Date.now()};
  DB.vendors.push(v);
  // Create subscription record
  var planInfo=PLANS[plan];
  DB.subscriptions.push({
    id:'s_'+Date.now(),vid:v.id,vendorName:n,plan:plan,
    amount:planInfo.price===0?0:planInfo.promo,
    screenshot:'',status:planInfo.price===0?'approved':'pending',
    startsAt:Date.now(),expiresAt:planInfo.price===0?Date.now()+365*24*3600000:0,
    createdAt:new Date().toLocaleString('ar-EG')
  });
  if(planInfo.price===0)v.active=true;
  saveDb();
  if(planInfo.price===0){V=v;toast('✅ تم إنشاء متجرك! مرحباً '+n);go('vendor')}
  else{toast('✅ تم التسجيل! ادفع ثم ارسل سكرين شوت للتفعيل');cv='auth';authMode='login';render()}
}
function superAdminLogin(){
  var e=document.getElementById('aE').value.trim(),p=document.getElementById('aP').value;
  if(e===SUPER_ADMIN_EMAIL&&(p===DB.adminPass||p===SUPER_ADMIN_PASS)){SA={email:e};DB.adminPass=p;saveDb();toast('👑 مرحباً أيها السوبر أدمن');go('admin');return}
  toast('❌ بيانات الدخول غير صحيحة');
}

/* ===== FORGOT PASSWORD ===== */
var _resetVendor=null;
function sendResetCode(){
  var e=document.getElementById('fE').value.trim();
  var v=DB.vendors.find(function(x){return x.email===e});
  if(!v)return toast('❌ لا يوجد حساب بهذا البريد');
  _resetVendor=v;
  document.getElementById('forgotStep1').style.display='none';
  document.getElementById('forgotStep2').style.display='block';
  toast('📱 تم إرسال الكود لـ '+v.phone.replace(/(\d{4})\d+(\d{2})/,'$1****$2'));
}
function verifyResetCode(){
  var code=document.getElementById('fCode').value.trim();
  if(code==='123456'){
    document.getElementById('forgotStep2').style.display='none';
    document.getElementById('forgotStep3').style.display='block';
    toast('✅ الكود صحيح — أدخل كلمة المرور الجديدة');
  }else{
    toast('❌ كود غير صحيح');
  }
}
function resetPassword(){
  var np=document.getElementById('fNewP').value,cp=document.getElementById('fConfP').value;
  if(!np||np.length<4)return toast('⚠️ 4 أحرف على الأقل');
  if(np!==cp)return toast('⚠️ كلمتا المرور غير متطابقتين');
  if(!_resetVendor)return toast('❌ خطأ — حاول مرة أخرى');
  _resetVendor.pass=np;saveDb();
  _resetVendor=null;
  authMode='login';render();
  toast('✅ تم تغيير كلمة المرور — سجل دخولك الآن');
}

/* ===== VENDOR DASHBOARD ===== */
function rVendorDash(){
  if(!V)return go('home');
  var vp=DB.products.filter(function(p){return p.vid===V.id});
  var vo=DB.orders.filter(function(o){return o.vid===V.id});
  var planInfo=PLANS[V.plan];
  var sub=DB.subscriptions.filter(function(s){return s.vid===V.id}).pop();
  var h='<div class="main">';
  // Store header
  h+='<div class="store-header"><div class="store-avatar">'+V.icon+'</div><div class="store-info"><h2>'+V.name+'</h2><p>'+(V.desc||'')+' — '+planInfo.icon+' '+planInfo.name+'</p></div></div>';
  // Upgrade prompt
  if(vp.length>=planInfo.products&&V.plan!=='unl'){
    h+='<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:var(--rs);padding:14px;margin-bottom:16px;text-align:center">'+
      '<strong>⚠️ وصلت للحد الأقصى ('+planInfo.products+' منتج)</strong><br>'+
      '<span style="font-size:13px">ترقية باقتك لإضافة المزيد</span><br>'+
      '<button class="btn btn-a btn-sm" style="margin-top:8px" onclick="showUpgrade()">⬆️ ترقية الباقة</button></div>';
  }
  // Tabs
  h+='<div class="tabs">'+
    '<div class="tab'+(vendorTab==='products'?' on':'')+'" onclick="vendorTab='products';render()">📦 المنتجات ('+vp.length+'/'+planInfo.products+')</div>'+
    '<div class="tab'+(vendorTab==='orders'?' on':'')+'" onclick="vendorTab='orders';render()">🛒 الطلبات ('+vo.length+')</div>'+
    '<div class="tab'+(vendorTab==='subscription'?' on':'')+'" onclick="vendorTab='subscription';render()">💎 الاشتراك</div>'+
    '<div class="tab'+(vendorTab==='store'?' on':'')+'" onclick="vendorTab='store';render()">🔗 متجري</div>'+
  '</div>';

  if(vendorTab==='products') h+=rVProducts(vp,planInfo);
  else if(vendorTab==='orders') h+=rVOrders(vo);
  else if(vendorTab==='subscription') h+=rVSub(planInfo,sub);
  else if(vendorTab==='store') h+=rVStore();

  h+='</div>';
  return h;
}

/* VENDOR: PRODUCTS */
function rVProducts(vp,planInfo){
  var canAdd=vp.length<planInfo.products;
  var h='<div class="sec-h"><div><h3 class="sec-t">📦 منتجاتي</h3></div>';
  h+='<button class="btn btn-p" onclick="addProd()" '+(canAdd?'':'disabled style="opacity:.5"')+'>➕ إضافة منتج</button></div>';
  if(!vp.length)return h+='<div class="empty"><div class="empty-ic">📦</div><h4>لا توجد منتجات بعد</h4><p>أضف أول منتج لمتجرك</p></div>';
  h+='<div class="prod-grid">'+vp.map(function(p){
    var sc=p.stock>10?'stock-ok':p.stock>0?'stock-low':'stock-out';
    var st=p.stock>10?'متوفر':p.stock>0?'كمية محدودة':'نفد';
    return '<div class="prod-card" style="position:relative">'+
      '<img class="prod-img" src="'+(p.img||genImg(p.name,'#8B4513'))+'" onclick="openLb(this.src)">'+
      '<div class="price-tag">'+p.price+' ج.م</div>'+
      '<div class="prod-body">'+
        '<h3 class="prod-title">'+p.name+'</h3>'+
        '<p class="prod-desc">'+p.desc+'</p>'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<span class="stock-badge '+sc+'">'+st+'</span>'+
          '<div><button class="btn btn-s btn-sm" onclick="editProd(''+p.id+'')">✏️</button> <button class="btn btn-d btn-sm" onclick="delProd(''+p.id+'')">🗑️</button></div>'+
        '</div>'+
      '</div></div>';
  }).join('')+'</div>';
  return h;
}

function addProd(){
  var planInfo = PLANS[V.plan||'free'];
  var existingChapters = [...new Set(DB.products.filter(function(p){return p.vid===V.id}).map(function(p){return p.chapter||'عام'}))];
  var chapterOpts = existingChapters.map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join('');
  sMo('إضافة منتج',
    '<div class="fg"><label>الباب (التصنيف)</label><select id="pCh" style="width:100%;padding:10px;border:1px solid var(--brd);border-radius:8px;background:var(--bg);color:var(--txt);font-family:inherit">'+
    '<option value="عام">عام (افتراضي)</option>'+chapterOpts+
    '<option value="__new__">➕ باب جديد</option></select>'+
    '<input id="pChNew" style="display:none;margin-top:8px" placeholder="اسم الباب الجديد"></div>'+
    '<div class="fg"><label>اسم المنتج</label><input id="pN" placeholder="اسم المنتج"></div>'+
    '<div class="fg"><label>الوصف</label><textarea id="pD" rows="2" placeholder="وصف المنتج"></textarea></div>'+
    '<div class="fg"><label>السعر (ج.م)</label><input id="pPr" type="number" placeholder="0"></div>'+
    '<div class="fg"><label>المخزون</label><input id="pSt" type="number" placeholder="0"></div>'+
    '<div class="fg"><label>صورة</label><div class="up-area" onclick="document.getElementById('pIm').click()"><p>📷 اضغط لرفع صورة</p></div>'+
    '<input type="file" id="pIm" accept="image/*" style="display:none" onchange="hPIm(this)"><div id="pImP" class="imgs"></div></div>',
    'saveProd(null)');
  setTimeout(function(){
    var sel=document.getElementById('pCh');
    var inp=document.getElementById('pChNew');
    if(sel&&inp) sel.onchange=function(){inp.style.display=sel.value==='__new__'?'block':'none'};
  },100);
}
function editProd(id){
  var p=DB.products.find(function(x){return x.id===id});
  var existingChapters = [...new Set(DB.products.filter(function(x){return x.vid===V.id}).map(function(x){return x.chapter||'عام'}))];
  var chapterOpts = existingChapters.map(function(c){return '<option value="'+c+'"'+(p.chapter===c?' selected':'')+'>'+c+'</option>'}).join('');
  sMo('تعديل المنتج',
    '<div class="fg"><label>الباب (التصنيف)</label><select id="pCh" style="width:100%;padding:10px;border:1px solid var(--brd);border-radius:8px;background:var(--bg);color:var(--txt);font-family:inherit">'+
    '<option value="عام"'+(p.chapter==='عام'||!p.chapter?' selected':'')+'>عام (افتراضي)</option>'+chapterOpts+
    '<option value="__new__">➕ باب جديد</option></select>'+
    '<input id="pChNew" style="display:none;margin-top:8px" placeholder="اسم الباب الجديد"></div>'+
    '<div class="fg"><label>اسم المنتج</label><input id="pN" value="'+p.name+'"></div>'+
    '<div class="fg"><label>الوصف</label><textarea id="pD" rows="2">'+p.desc+'</textarea></div>'+
    '<div class="fg"><label>السعر (ج.م)</label><input id="pPr" type="number" value="'+p.price+'"></div>'+
    '<div class="fg"><label>المخزون</label><input id="pSt" type="number" value="'+p.stock+'"></div>'+
    '<div class="fg"><label>صورة</label><div class="up-area" onclick="document.getElementById('pIm').click()"><p>📷 اضغط لتغيير الصورة</p></div>'+
    '<input type="file" id="pIm" accept="image/*" style="display:none" onchange="hPIm(this)"><div id="pImP" class="imgs">'+(p.img?'<div class="img-it"><img src="'+p.img+'"><button class="img-rm" onclick="window._pImg='';this.parentElement.remove()">✕</button></div>':'')+'</div></div>',
    'saveProd(''+id+'')');
  setTimeout(function(){
    var sel=document.getElementById('pCh');
    var inp=document.getElementById('pChNew');
    if(sel&&inp) sel.onchange=function(){inp.style.display=sel.value==='__new__'?'block':'none'};
  },100);
}
window._pImg='';
function hPIm(el){
  var f=el.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(ev){
    cmpImg(ev.target.result,600,.7).then(function(c){
      window._pImg=c;
      document.getElementById('pImP').innerHTML='<div class="img-it"><img src="'+c+'"><button class="img-rm" onclick="window._pImg='';this.parentElement.remove()">✕</button></div>';
    });
  };r.readAsDataURL(f);
}
function saveProd(id){
  var n=document.getElementById('pN').value.trim(),d=document.getElementById('pD').value.trim(),
      pr=parseInt(document.getElementById('pPr').value)||0,st=parseInt(document.getElementById('pSt').value)||0;
  var chSel=document.getElementById('pCh');
  var chNew=document.getElementById('pChNew');
  var chapter='عام';
  if(chSel){
    if(chSel.value==='__new__'&&chNew){
      chapter=(chNew.value.trim()||'عام');
      // Check chapter limit
      var planInfo=PLANS[V.plan||'free'];
      var existingChapters=[...new Set(DB.products.filter(function(p){return p.vid===V.id}).map(function(p){return p.chapter||'عام'}))];
      if(!existingChapters.includes(chapter)&&existingChapters.length>=planInfo.chapters){
        return toast('⚠️ باقتك تسمح بـ '+planInfo.chapters+' باب فقط. ترقى لباقة أعلى.');
      }
    } else {
      chapter=chSel.value;
    }
  }
  if(!n)return toast('⚠️ أدخل اسم المنتج');
  if(id){
    var p=DB.products.find(function(x){return x.id===id});
    Object.assign(p,{name:n,desc:d,price:pr,stock:st,img:window._pImg||p.img,chapter:chapter});
    toast('✅ تم التحديث');
  }else{
    DB.products.push({id:'p_'+Date.now(),vid:V.id,name:n,desc:d,price:pr,stock:st,img:window._pImg||'',chapter:chapter});
    toast('✅ تم الإضافة');
  }
  window._pImg='';saveDb();clMo();render();
}
function delProd(id){var p=DB.products.find(function(x){return x.id===id});sMo('⚠️ حذف','<p>هل تريد حذف "'+p.name+'"؟</p>','doDelProd(''+id+'')')}
function doDelProd(id){DB.products=DB.products.filter(function(p){return p.id!==id});saveDb();clMo();render();toast('🗑️ تم الحذف')}

/* VENDOR: ORDERS */
function rVOrders(vo){
  if(!vo.length)return '<div class="empty"><div class="empty-ic">🛒</div><h4>لا توجد طلبات بعد</h4></div>';
  return '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>رقم الطلب</th><th>العميل</th><th>المبلغ</th><th>الحالة</th><th>التاريخ</th></tr></thead><tbody>'+
    vo.map(function(o){
      var sc=o.status==='pending'?'bdg-warn':o.status==='confirmed'?'bdg-info':'bdg-ok';
      var st=o.status==='pending'?'⏳ معلق':o.status==='confirmed'?'✅ مؤكد':'📦 تم التوصيل';
      return '<tr><td>'+o.id+'</td><td>'+o.customerName+'</td><td>'+o.total+' ج.م</td><td><span class="bdg '+sc+'">'+st+'</span></td><td>'+o.date+'</td></tr>';
    }).join('')+'</tbody></table></div>';
}

/* VENDOR: SUBSCRIPTION */
function rVSub(planInfo,sub){
  var h='<div class="sec-h"><div><h3 class="sec-t">💎 اشتراكي</h3></div></div>';
  h+='<div class="card" style="padding:24px;margin-bottom:16px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h+='<div><h3>'+planInfo.icon+' '+planInfo.name+'</h3><p style="color:var(--txtl);font-size:13px">حتى '+planInfo.products+' منتج</p></div>';
  h+='<span class="bdg bdg-'+(planInfo.price===0?'ok':'info')+'">'+(planInfo.price===0?'مجاني':planInfo.promo+' ج.م/شهر')+'</span></div>';
  if(sub){
    var stCls=sub.status==='approved'?'bdg-ok':sub.status==='pending'?'bdg-warn':'bdg-err';
    var stTxt=sub.status==='approved'?'✅ مفعل':sub.status==='pending'?'⏳ قيد المراجعة':'❌ مرفوض';
    h+='<div style="display:flex;justify-content:space-between;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:12px"><span>حالة الاشتراك</span><span class="bdg '+stCls+'">'+stTxt+'</span></div>';
    if(sub.status==='pending'&&planInfo.price>0){
      h+='<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:14px;margin-top:12px">';
      h+='<strong>⚠️ بانتظار الدفع</strong><p style="font-size:13px;margin-top:6px">ادفع على أحد الأرقام التالية ثم ارسل سكرين شوت:</p>';
      DB.paymentNumbers.forEach(function(pm){
        h+='<div class="pay-box"><h4>'+(pm.type==='instapay'?'⚡ إنستاباي':'📱 فودافون كاش')+'</h4><div class="pay-num">'+pm.number+'</div><p style="font-size:12px;color:var(--txtl);text-align:center">'+pm.name+'</p></div>';
      });
      h+='<div class="up-area" onclick="document.getElementById('sScr').click()" style="margin-top:12px"><p>📷 ارفق سكرين شوت الدفع</p></div>';
      h+='<input type="file" id="sScr" accept="image/*" style="display:none" onchange="hSScr(this)">';
      h+='<div id="sScrP" class="imgs" style="margin-top:10px"></div>';
      h+='<button class="btn btn-p" style="width:100%;margin-top:12px" onclick="submitPayment()">📤 إرسال سكرين شوت</button>';
      h+='</div>';
    }
  }
  h+='</div>';
  if(planInfo.price>0)h+='<button class="btn btn-a" onclick="showUpgrade()">⬆️ ترقية الباقة</button>';
  return h;
}
function hSScr(el){
  var f=el.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(ev){
    cmpImg(ev.target.result,800,.7).then(function(c){
      window._sScr=c;
      document.getElementById('sScrP').innerHTML='<div class="img-it"><img src="'+c+'"><button class="img-rm" onclick="window._sScr='';this.parentElement.remove()">✕</button></div>';
    });
  };r.readAsDataURL(f);
}
window._sScr='';
function submitPayment(){
  if(!window._sScr)return toast('⚠️ ارفق سكرين شوت أولاً');
  var sub=DB.subscriptions.filter(function(s){return s.vid===V.id}).pop();
  if(sub){sub.screenshot=window._sScr;sub.status='pending';}
  window._sScr='';saveDb();toast('✅ تم إرسال السكرين شوت — بانتظار المراجعة');render();
}
function showUpgrade(){
  var h='<h3 style="margin-bottom:16px">ترقية الباقة</h3>';
  Object.keys(PLANS).forEach(function(k){
    var p=PLANS[k];
    if(k===V.plan)return;
    h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--brd);border-radius:8px;margin-bottom:8px">'+
      '<div>'+p.icon+' <strong>'+p.name+'</strong> — حتى '+p.products+' منتج</div>'+
      '<div><span style="text-decoration:line-through;color:var(--txtm);font-size:12px">'+p.price+'</span> <strong style="color:var(--p)">'+p.promo+' ج.م/شهر</strong></div>'+
      '<button class="btn btn-p btn-sm" onclick="upgradeTo(''+k+'')">اختيار</button></div>';
  });
  sMo('⬆️ ترقية الباقة',h,'clMo()');
}
function upgradeTo(plan){
  V.plan=plan;
  var pi=PLANS[plan];
  DB.subscriptions.push({
    id:'s_'+Date.now(),vid:V.id,vendorName:V.name,plan:plan,
    amount:pi.promo,screenshot:'',status:pi.price===0?'approved':'pending',
    startsAt:0,expiresAt:0,createdAt:new Date().toLocaleString('ar-EG')
  });
  saveDb();clMo();render();
  if(pi.price===0)toast('✅ تم الترقية!');else toast('📤 ادفع وأرسل سكرين شوت للتفعيل');
}

/* ===== PUBLIC STORE ===== */
var storeViewId=null;
var storeActiveChapter='all';
function openStore(idOrSlug){
  var v=DB.vendors.find(function(x){return x.id===idOrSlug||x.slug===idOrSlug});
  if(v){storeViewId=v.id;storeActiveChapter='all';cv='store';render();window.scrollTo(0,0)}
  else toast('❌ المتجر غير موجود');
}
function rPublicStore(){
  var v=DB.vendors.find(function(x){return x.id===storeViewId});
  if(!v)return '<div class="main"><div class="empty"><div class="empty-ic">❌</div><h4>المتجر غير موجود</h4></div></div>';
  var vp=DB.products.filter(function(p){return p.vid===v.id});
  var chapters=[...new Set(vp.map(function(p){return p.chapter||'عام'}))];
  var filtered=storeActiveChapter==='all'?vp:vp.filter(function(p){return (p.chapter||'عام')===storeActiveChapter});
  var h='<div class="main">';
  h+='<button class="back" onclick="go('home')">← العودة</button>';
  h+='<div class="store-header"><div class="store-avatar">'+v.icon+'</div><div class="store-info"><h2>'+v.name+'</h2><p>'+(v.desc||'حيوانات أليفة ومستلزماتها')+'</p></div></div>';
  // Chapter tabs
  if(chapters.length>1){
    h+='<div class="tabs" style="margin-bottom:20px">';
    h+='<div class="tab'+(storeActiveChapter==='all'?' on':'')+'" onclick="storeActiveChapter='all';render()">الكل ('+vp.length+')</div>';
    chapters.forEach(function(ch){
      var count=vp.filter(function(p){return(p.chapter||'عام')===ch}).length;
      h+='<div class="tab'+(storeActiveChapter===ch?' on':'')+'" onclick="storeActiveChapter=''+ch+'';render()">'+ch+' ('+count+')</div>';
    });
    h+='</div>';
  }
  h+='<div class="prod-grid">'+filtered.map(function(p){
    var sc=p.stock>10?'stock-ok':p.stock>0?'stock-low':'stock-out';
    var st=p.stock>10?'متوفر':p.stock>0?'كمية محدودة':'نفد';
    return '<div class="prod-card" style="position:relative">'+
      '<img class="prod-img" src="'+(p.img||genImg(p.name,'#8B4513'))+'" onclick="openLb(this.src)">'+
      '<div class="price-tag">'+p.price+' ج.م</div>'+
      '<div class="prod-body">'+
        '<h3 class="prod-title">'+p.name+'</h3>'+
        '<p class="prod-desc">'+p.desc+'</p>'+
        '<div style="display:flex;justify-content:space-between;align-items:center">'+
          '<span class="stock-badge '+sc+'">'+st+'</span>'+
          (p.stock>0?'<button class="btn btn-p btn-sm" onclick="event.stopPropagation();showPlaceOrder(''+p.id+'')">🛒 اطلب</button>':'')+
        '</div>'+
      '</div></div>';
  }).join('')+'</div>';
  if(!vp.length)h+='<div class="empty"><div class="empty-ic">📦</div><h4>لا توجد منتجات بعد</h4></div>';
  h+='</div>';
  return h;
}

  '</div>';

  // Tabs
  h+='<div class="tabs">'+
    '<div class="tab'+(adminTab==='vendors'?' on':'')+'" onclick="adminTab='vendors';render()">🏪 البائعين</div>'+

    '<div class="tab'+(adminTab==='products'?' on':'')+'" onclick="adminTab='products';render()">📦 المنتجات</div>'+
    '<div class="tab'+(adminTab==='auction'?' on':'')+'" onclick="adminTab='auction';render()">📢 المزاد</div>'+
    '<div class="tab'+(adminTab==='settings'?' on':'')+'" onclick="adminTab='settings';render()">⚙️ الإعدادات</div>'+

  if(adminTab==='vendors') h+=rAdVendors();
  else if(adminTab==='payments') h+=rAdPayments();

/* ADMIN: VENDORS */
function rAdVendors(){
  var h='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>المتجر</th><th>البريد</th><th>الباقة</th><th>المنتجات</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody>';
  DB.vendors.forEach(function(v){
    var pc=DB.products.filter(function(p){return p.vid===v.id}).length;
    var planInfo=PLANS[v.plan];
    var stCls=v.active?'bdg-ok':'bdg-warn';
    var stTxt=v.active?'✅ نشط':'⏳ غير مفعل';
    h+='<tr>'+
      '<td>'+v.icon+' '+v.name+'</td>'+
      '<td>'+v.email+'</td>'+
      '<td><span class="bdg bdg-'+planInfo.cls+'">'+planInfo.icon+' '+planInfo.name+'</span></td>'+
      '<td>'+pc+'/'+planInfo.products+'</td>'+
      '<td><span class="bdg '+stCls+'">'+stTxt+'</span></td>'+
      '<td>'+(v.active?'<button class="btn btn-d btn-sm" onclick="deactVendor(''+v.id+'')">⛔ إيقاف</button>':'<button class="btn btn-ok btn-sm" onclick="actVendor(''+v.id+'')">✅ تفعيل</button>')+
      ' <button class="btn btn-s btn-sm" onclick="openStore(''+v.id+'')">👁️</button></td></tr>';
  });
  h+='</tbody></table></div>';
  if(!DB.vendors.length)h+='<div class="empty"><div class="empty-ic">🏪</div><h4>لا يوجد بائعين بعد</h4></div>';
  return h;
}
function actVendor(id){
  DB.vendors.find(function(v){return v.id===id}).active=true;
  var sub=DB.subscriptions.filter(function(s){return s.vid===id}).pop();
  if(sub){sub.status='approved';sub.startsAt=Date.now();sub.expiresAt=Date.now()+30*24*3600000;}
  saveDb();render();toast('✅ تم التفعيل');
}
function deactVendor(id){
  DB.vendors.find(function(v){return v.id===id}).active=false;
  saveDb();render();toast('⛔ تم الإيقاف');
}

function rAdPayments(){

    pending.forEach(function(s){

      h+='<div class="card" style="padding:20px;margin-bottom:12px">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
      h+='<div><strong>'+(v?v.icon+' '+v.name:'غير معروف')+'</strong><br><span style="font-size:12px;color:var(--txtl)">الباقة: '+PLANS[s.plan].name+' — '+s.amount+' ج.م/شهر</span></div>';
      h+='<span class="bdg bdg-warn">⏳ قيد المراجعة</span></div>';

        h+='<img src="'+s.screenshot+'" style="max-width:200px;border-radius:8px;cursor:pointer;margin-bottom:12px" onclick="openLb(this.src)">';
      }else{
        h+='<p style="color:var(--txtm);font-size:13px;margin-bottom:12px">لا يوجد سكرين شوت بعد</p>';
      }
      h+='<div style="display:flex;gap:8px">';
      h+='<button class="btn btn-ok" onclick="approvePay(''+s.id+'')">✅ موافقة وتفعيل</button>';
      h+='<button class="btn btn-d" onclick="rejectPay(''+s.id+'')">❌ رفض</button>';
      h+='</div></div>';
    });
  } else {
    h+='<div class="empty"><div class="empty-ic">✅</div><h4>لا توجد دفعات بانتظار المراجعة</h4></div>';
  }

  // Approved history
  if(approved.length){
    h+='<h3 style="color:var(--txtl);margin:24px 0 12px">📋 سجل الدفعات المؤكدة</h3>';
    h+='<div class="tbl-wrap"><table class="tbl"><thead><tr><th>البائع</th><th>الباقة</th><th>المبلغ</th><th>تاريخ البدء</th><th>تاريخ الانتهاء</th></tr></thead><tbody>';
    approved.forEach(function(s){
      var v=DB.vendors.find(function(x){return x.id===s.vid});
      h+='<tr><td>'+(v?v.name:'—')+'</td><td>'+PLANS[s.plan].name+'</td><td>'+s.amount+' ج.م</td><td>'+(s.startsAt?new Date(s.startsAt).toLocaleDateString('ar-EG'):'—')+'</td><td>'+(s.expiresAt?new Date(s.expiresAt).toLocaleDateString('ar-EG'):'—')+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  return h;
}
function approvePay(sid){
  var s=DB.subscriptions.find(function(x){return x.id===sid});
  s.status='approved';s.startsAt=Date.now();s.expiresAt=Date.now()+30*24*3600000;
  var v=DB.vendors.find(function(x){return x.id===s.vid});
  if(v){v.active=true;v.plan=s.plan;}
  saveDb();render();toast('✅ تم التفعيل — '+v.name);
}
function rejectPay(sid){
  DB.subscriptions.find(function(x){return x.id===sid}).status='rejected';
  saveDb();render();toast('❌ تم الرفض');
}

function saveAd(aid){

  var a=DB.auctions.find(function(x){return x.id===aid});
  a.adTitle=title;
  a.adText=document.getElementById('adText').value.trim();
  a.adImg=document.getElementById('adImg').value.trim();
  a.adStatus='pending'; // needs super admin approval
  saveDb();clMo();render();toast('✅ تم حفظ الإعلان — بانتظار موافقة السوبر أدمن');
}

function placeBid(){
  var vid=document.getElementById('bidVendor').value;
  var amt=parseInt(document.getElementById('bidAmt').value)||0;
  if(!amt)return toast('⚠️ أدخل مبلغ المزايدة');
  DB.auctions=DB.auctions.filter(function(a){return !(a.vid===vid&&a.round===DB.currentRound)});
  DB.auctions.push({id:'a_'+Date.now(),vid:vid,bid:amt,round:DB.currentRound,ts:Date.now()});
  saveDb();render();toast('✅ تمت المزايدة بـ '+amt+' ج.م');
}
function newAuctionRound(){
  DB.currentRound++;
  saveDb();render();toast('🔄 بدأت الجولة #'+DB.currentRound);
}

function customerLogin(){
  var e=document.getElementById('cE').value.trim(),p=document.getElementById('cP').value;
  if(!DB.customers)DB.customers=[];
  var c=DB.customers.find(function(x){return x.email===e&&x.pass===p});
  if(!c)return toast('❌ بيانات الدخول غير صحيحة');
  C=c;saveDb();toast('✅ مرحباً '+c.name);go('customer');
}
function customerRegister(){
  var n=document.getElementById('cN').value.trim(),e=document.getElementById('cRE').value.trim(),
      ph=document.getElementById('cPh').value.trim(),pa=document.getElementById('cRP').value,
      addr=document.getElementById('cAddr').value.trim();
  if(!n||!e||!ph||!pa)return toast('⚠️ أكمل جميع الحقول المطلوبة');
  if(!DB.customers)DB.customers=[];
  if(DB.customers.find(function(x){return x.email===e}))return toast('⚠️ البريد مسجل مسبقاً');
  var c={id:'c_'+Date.now(),name:n,email:e,phone:ph,pass:pa,address:addr,createdAt:new Date().toLocaleString('ar-EG')};
  DB.customers.push(c);
  if(!DB.customerOrders)DB.customerOrders=[];
  saveDb();
  C=c;toast('✅ تم إنشاء حسابك! مرحباً '+n);go('customer');
}

/* ===== PLACE ORDER (CUSTOMER) ===== */
function showPlaceOrder(productId){
  if(!C){toast('⚠️ سجل دخولك أولاً كعميل');showLoginPopup();return}
  var p=DB.products.find(function(x){return x.id===productId});
  if(!p)return toast('❌ المنتج غير موجود');
  var v=DB.vendors.find(function(x){return x.id===p.vid});
  if(!v)return toast('❌ المتجر غير موجود');
  var h='<div style="text-align:right">'+
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:var(--bg);border-radius:8px">'+
      '<img src="'+(p.img||genImg(p.name,'#8B4513'))+'" style="width:60px;height:60px;border-radius:8px;object-fit:cover">'+
      '<div><strong>'+p.name+'</strong><br><span style="color:var(--p);font-weight:700">'+p.price+' ج.م</span></div>'+
    '</div>'+
    '<div class="fg"><label>الكمية</label><input type="number" id="ordQty" value="1" min="1" max="'+p.stock+'"></div>'+
    '<div class="fg"><label>عنوان التوصيل</label><input id="ordAddr" value="'+(C.address||'')+'"></div>'+
    '<div class="fg"><label>ملاحظات (اختياري)</label><textarea id="ordNotes" rows="2" placeholder="أي ملاحظات على الطلب..."></textarea></div>'+
    '<div style="background:var(--bg);padding:12px;border-radius:8px;margin:12px 0">'+
      '<div style="display:flex;justify-content:space-between"><span>سعر الوحدة:</span><span>'+p.price+' ج.م</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-weight:700;margin-top:6px;border-top:1px solid var(--brd);padding-top:6px"><span>الإجمالي:</span><span id="ordTotal">'+p.price+' ج.م</span></div>'+
    '</div>'+
  '</div>';
  sMo('🛒 طلب منتج',h,'placeOrder(''+productId+'')');
  setTimeout(function(){
    var qty=document.getElementById('ordQty');
    if(qty)qty.addEventListener('input',function(){
      var q=parseInt(this.value)||1;
      document.getElementById('ordTotal').textContent=(p.price*q)+' ج.م';
    });
  },100);
}
function placeOrder(productId){
  var p=DB.products.find(function(x){return x.id===productId});
  var v=DB.vendors.find(function(x){return x.id===p.vid});
  var qty=parseInt(document.getElementById('ordQty').value)||1;
  var addr=document.getElementById('ordAddr').value.trim();
  var notes=document.getElementById('ordNotes').value.trim();
  if(qty<1||qty>p.stock)return toast('⚠️ الكمية غير متاحة');
  if(!addr)return toast('⚠️ أدخل عنوان التوصيل');
  var total=p.price*qty;
  if(!DB.customerOrders)DB.customerOrders=[];
  var order={
    id:'co_'+Date.now(),cid:C.id,customerName:C.name,customerPhone:C.phone,
    vid:v.id,vendorName:v.name,productId:p.id,productName:p.name,
    qty:qty,price:p.price,total:total,address:addr,notes:notes,
    itemsSummary:p.name+' × '+qty,
    status:'pending',date:new Date().toLocaleString('ar-EG'),ts:Date.now()
  };
  DB.customerOrders.push(order);
  DB.orders.push({id:order.id,vid:v.id,customerName:C.name+' (عميل)',total:total,status:'pending',date:order.date});
  p.stock=Math.max(0,p.stock-qty);
  saveDb();clMo();
  toast('✅ تم الطلب بنجاح! رقم الطلب: #'+order.id.slice(-6));
  if(cv==='store')render();
}

function sMo(t,b,a){
  var mo=document.getElementById('mo');
  if(!mo){mo=document.createElement('div');mo.id='mo';mo.className='mo';document.body.appendChild(mo)}
  mo.innerHTML='<div class="md"><div class="md-h"><h3>'+t+'</h3><button class="md-x" onclick="clMo()">✕</button></div><div class="md-b">'+b+'</div><div class="md-f"><button class="btn btn-s" onclick="clMo()">إلغاء</button><button class="btn btn-p" onclick="'+a+'">💾 حفظ</button></div></div>';

function clMo(){var m=document.getElementById('mo');if(m)m.classList.remove('on')}
function openLb(s){document.getElementById('lbImg').src=s;document.getElementById('lb').classList.add('on')}
function closeLb(){document.getElementById('lb').classList.remove('on')}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(function(){t.classList.remove('on')},3000)}
function cmpImg(dU,mW,q){return new Promise(function(r){var i=new Image();i.onload=function(){var c=document.createElement('canvas');var w=i.width,h=i.height;if(w>mW){h=h*mW/w;w=mW}c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);r(c.toDataURL('image/jpeg',q))};i.src=dU})}
function copyText(t){navigator.clipboard.writeText(t).then(function(){toast('📋 تم النسخ')}).catch(function(){toast('❌ فشل النسخ')})}

/* ===== CONTACT FORM ===== */
function submitContact(){
  var n=document.getElementById('cName').value.trim();
  var e=document.getElementById('cEmail').value.trim();
  var s=document.getElementById('cSubject').value;
  var m=document.getElementById('cMsg').value.trim();
  if(!n||!e||!s||!m){toast('⚠️ يرجى ملء جميع الحقول');return}
  var contacts=JSON.parse(localStorage.getItem('attara_contacts')||'[]');
  contacts.push({name:n,email:e,subject:s,message:m,date:new Date().toISOString()});
  localStorage.setItem('attara_contacts',JSON.stringify(contacts));
  var body=encodeURIComponent('الاسم: '+n+'\nالبريد: '+e+'\nالموضوع: '+s+'\n\nالرسالة:\n'+m);
  window.location.href='mailto:emadh5156@gmail.com?subject='+encodeURIComponent('[PetMark — سوق الحيوانات الأليفة] '+s)+'&body='+body;
  toast('✅ تم إرسال رسالتك بنجاح!');
  document.getElementById('cName').value='';
  document.getElementById('cEmail').value='';
  document.getElementById('cSubject').value='';
  document.getElementById('cMsg').value='';
}

/* ===== DARK MODE ===== */
function toggleDark(){
  document.body.classList.toggle('dark');
  var isDark=document.body.classList.contains('dark');
  localStorage.setItem('attara_dark',isDark?'1':'0');
  document.getElementById('darkIcon').textContent=isDark?'☀️':'🌙';
}
function initDark(){
  if(localStorage.getItem('attara_dark')==='1'){
    document.body.classList.add('dark');
    var ic=document.getElementById('darkIcon');
    if(ic)ic.textContent='☀️';
  }
}
